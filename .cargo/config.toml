# This fixes a bug where the application failed to load,
# with this error on atttempting to instaniate the MainWindow:
#     'main' has overflowed its stack
# See https://github.com/slint-ui/slint/issues/4586
[target.x86_64-pc-windows-msvc]
# Increase default stack size to match Linux
rustflags = [
    "-C", "link-arg=/STACK:10000000"
]
[target.aarch64-pc-windows-msvc]
# Increase default stack size to match Linux
rustflags = [
    "-C", "link-arg=/STACK:10000000"
]